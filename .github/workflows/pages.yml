name: Build and deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 0"   # weekly refresh, Sunday 06:00 UTC

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install openpyxl
      - name: Rebuild main dashboard data.json
        run: python3 build.py
      - name: Rebuild multi-facility dashboard data.json
        run: cd multi-facility-dashboard && python3 build.py
      - name: Stage combined site (main at /, multi-facility at /multi-facility-dashboard/)
        run: |
          mkdir -p _site_combined
          cp -r site/. _site_combined/
          mkdir -p _site_combined/multi-facility-dashboard
          cp -r multi-facility-dashboard/site/. _site_combined/multi-facility-dashboard/
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site_combined
      - id: deployment
        uses: actions/deploy-pages@v4
