<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e7490">
<title>صيانة الأجهزة الطبية | Medical Equipment Maintenance</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-title">
    <h1 id="app-title">صيانة الأجهزة الطبية</h1>

  </div>
  <select id="category-select" class="category-select" hidden></select>

<main id="view" class="view"></main>

<nav class="tabbar">

  <button class="tab" data-view="plan"><span class="tab-icon">🔁</span><span class="tab-label" data-i18n="tab_plan"></span></button>
  <button class="tab" data-view="parts"><span class="tab-icon">🔧</span><span class="tab-label" data-i18n="tab_parts"></span></button>
</nav>

<div id="modal" class="modal" hidden>
  <div class="modal-card" id="modal-card"></div>
</div>

<script src="app.js"></script>

</html>
